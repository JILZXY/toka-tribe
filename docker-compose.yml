services:
  # ── MongoDB ──
  mongo:
    image: mongo:7
    container_name: toka_tribe_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: toka_tribe
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  # Redis removed — using in-memory cache by default or external managed Redis via REDIS_URL

  # ── API NestJS ──
  api:
    image: docker.io/jilzyx/toka-api:latest
    container_name: toka_tribe_api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      # Use MONGODB_URI from environment (allows external managed DB)
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-in-production-32chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super-refresh-secret-change-in-prod-32}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-604800}
      TOKA_BASE_URL: ${TOKA_BASE_URL:-https://talentland-toka.eastus2.cloudapp.azure.com}
      TOKA_APP_ID: ${TOKA_APP_ID:-your-toka-app-id}
      ALIPAY_MERCHANT_CODE: ${ALIPAY_MERCHANT_CODE:-30100}
      THROTTLE_TTL: ${THROTTLE_TTL:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
      # REDIS_URL removed: service will fallback to in-memory cache unless REDIS_URL env is provided
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-30}
      LEADERBOARD_CACHE_TTL_SECONDS: ${LEADERBOARD_CACHE_TTL_SECONDS:-20}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mongo_data:
    driver: local
