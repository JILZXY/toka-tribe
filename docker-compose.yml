services:
  # ── MongoDB ──
  mongo:
    image: mongo:7
    container_name: toka_tribe_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: toka_tribe
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis Cache ──
  redis:
    image: redis:7-alpine
    container_name: toka_tribe_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── API NestJS ──
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toka_tribe_api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/toka_tribe
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-in-production-32chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super-refresh-secret-change-in-prod-32}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-604800}
      TOKA_BASE_URL: ${TOKA_BASE_URL:-https://talentland-toka.eastus2.cloudapp.azure.com}
      TOKA_APP_ID: ${TOKA_APP_ID:-your-toka-app-id}
      ALIPAY_MERCHANT_CODE: ${ALIPAY_MERCHANT_CODE:-30100}
      THROTTLE_TTL: ${THROTTLE_TTL:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-30}
      LEADERBOARD_CACHE_TTL_SECONDS: ${LEADERBOARD_CACHE_TTL_SECONDS:-20}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
